<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
        <h2>Simon Says Game</h2>
        <h3>Press any key to start</h3>
        <div class="game_box">
            <div class="col1">
                <div class="btn one" type="button" id="one"></div>
                <div class="btn two" type="button" id="two"></div>
            </div>
            <div class="col2">
                <div class="btn three" type="button" id="three"></div>
                <div class="btn four" type="button" id="four"></div>
            </div>
            <div class="col3">
                <div class="btn five" type="button" id="five"></div>
                <div class="btn six" type="button" id="six"></div>
            </div>
            
        </div>
    <script src="script.js"></script>
</body>
</html>
